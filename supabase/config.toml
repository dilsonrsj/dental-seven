# Minimal Supabase CLI config for Dental Seven MVP
# Link project: supabase link --project-ref <ref>

project_id = "dental-seven"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[db.migrations]
enabled = true
